<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Cliente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1116;
      --panel: #1d222d;
      --line: #2f3540;
      --text: #f1f5fb;
      --muted: #9ca7ba;
      --primary: #2f9ff5;
      --ok: #8fd8af;
      --err: #f2a8a8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, sans-serif;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .shell {
      width: min(860px, 100%);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .brand {
      display: grid;
      justify-items: center;
      gap: 12px;
      text-align: center;
    }

    .brand img {
      width: min(220px, 68vw);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.35));
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .full {
      grid-column: 1 / -1;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #161a20;
      color: var(--text);
      padding: 11px 12px;
      font: inherit;
    }

    input:focus {
      outline: 2px solid rgba(47, 159, 245, 0.2);
      border-color: var(--primary);
    }

    button {
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      font: inherit;
      font-weight: 600;
      padding: 12px 16px;
      cursor: pointer;
      justify-self: start;
    }

    .feedback {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--muted);
      min-height: 42px;
    }

    .feedback.ok {
      color: var(--ok);
    }

    .feedback.err {
      color: var(--err);
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="brand">
      <img src="assets/logo-rafael.png" alt="Logo Rafael Hanson Photography">
      <h1>Cadastro de cliente</h1>
      <p>Olá, muito obrigado por nos escolher. Aqui vamos registrar lindas memórias para que daqui a um tempo você veja isso e você consiga reviver. Boas-vindas.</p>
    </section>

    <form id="intake-form" class="grid">
      <label>
        Nome
        <input name="first_name" required>
      </label>
      <label>
        Sobrenome
        <input name="last_name" required>
      </label>
      <label>
        Email
        <input name="email" type="email">
      </label>
      <label>
        Fone
        <input name="phone">
      </label>
      <label>
        CPF
        <input name="cpf" id="intake-cpf" maxlength="14" placeholder="000.000.000-00">
      </label>
      <label class="full">
        Endereco
        <input name="address" id="intake-address">
      </label>
      <label>
        CEP
        <input name="zip" id="intake-zip" maxlength="9" placeholder="00000-000">
      </label>
      <label>
        Bairro
        <input name="district" id="intake-district">
      </label>
      <label class="full">
        Cidade
        <input name="city" id="intake-city">
      </label>

      <button type="submit">Enviar cadastro</button>
    </form>

    <div id="intake-feedback" class="feedback"></div>
  </main>

  <script src="intake-config.js"></script>
  <script src="cliente-intake.js"></script>
</body>
</html>
